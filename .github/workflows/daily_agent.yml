name: Daily Price Agent

on:
  schedule:
    # 6 AM EST = 11:00 UTC (adjust if you're on EDT: 10:00 UTC)
    - cron: "0 11 * * *"
  workflow_dispatch:  # manual trigger from the GitHub Actions UI

jobs:
  run-agent:
    name: Refresh prices & send digest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: agent/requirements.txt

      - name: Install dependencies
        run: pip install -r agent/requirements.txt

      - name: Run daily agent
        env:
          PPT_API_KEY:            ${{ secrets.PPT_API_KEY }}
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
          SMTP_USER:              ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:          ${{ secrets.SMTP_PASSWORD }}
          DIGEST_TO:              ${{ secrets.DIGEST_TO }}
        run: python agent/daily_agent.py
